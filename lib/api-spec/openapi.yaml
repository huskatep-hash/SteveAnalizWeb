openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Steve Analiz.web API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blog
    description: Blog post operations
  - name: education
    description: Education content operations
  - name: writer
    description: Writer platform operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Blog ───────────────────────────────────────────────
  /blog/stats:
    get:
      operationId: getBlogStats
      tags: [blog]
      summary: Get blog statistics
      responses:
        "200":
          description: Blog statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogStats"
  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List all blog posts
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [analysis, education, general]
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: createBlogPost
      tags: [blog]
      summary: Create a new blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlogPostBody"
      responses:
        "201":
          description: Created blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /blog/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a single blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Education ──────────────────────────────────────────
  /education:
    get:
      operationId: listEducationContent
      tags: [education]
      summary: List all education content
      responses:
        "200":
          description: List of education items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EducationPost"
    post:
      operationId: createEducationContent
      tags: [education]
      summary: Create new education content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEducationBody"
      responses:
        "201":
          description: Created education post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EducationPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /education/{slug}:
    get:
      operationId: getEducationContent
      tags: [education]
      summary: Get a single education item by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Education post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EducationPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Writer ─────────────────────────────────────────────
  /writer:
    get:
      operationId: listWriters
      tags: [writer]
      summary: List all writer applications
      responses:
        "200":
          description: List of writers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Writer"
    post:
      operationId: applyAsWriter
      tags: [writer]
      summary: Submit a writer application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWriterBody"
      responses:
        "201":
          description: Writer application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Writer"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /writer/approved:
    get:
      operationId: listApprovedWriters
      tags: [writer]
      summary: List only approved writers
      responses:
        "200":
          description: Approved writers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Writer"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    BlogPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        author:
          type: string
        summary:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        type:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, slug, author, summary, content, tags, type, createdAt, updatedAt]

    CreateBlogPostBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        author:
          type: string
        summary:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        type:
          type: string
          default: analysis
      required: [title, slug, author, summary, content, tags]

    BlogStats:
      type: object
      properties:
        totalPosts:
          type: integer
        tagCounts:
          type: object
          additionalProperties:
            type: integer
      required: [totalPosts, tagCounts]

    EducationPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        summary:
          type: string
        type:
          type: string
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, slug, content, summary, type, order, createdAt, updatedAt]

    CreateEducationBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        summary:
          type: string
        type:
          type: string
          default: education
        order:
          type: integer
          default: 0
      required: [title, slug, content, summary]

    Writer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        bio:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, bio, status, createdAt]

    CreateWriterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        bio:
          type: string
      required: [name, email, bio]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
