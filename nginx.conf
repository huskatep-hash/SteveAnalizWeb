# ============================================================
# Steve Analiz.web — nginx reverse proxy + SSL (Let's Encrypt)
# Place in /etc/nginx/sites-available/steveanalizweb
# Then: ln -s /etc/nginx/sites-available/steveanalizweb /etc/nginx/sites-enabled/
# Get cert: certbot --nginx -d steveanalizweb.com -d www.steveanalizweb.com
# ============================================================

server {
    listen 80;
    server_name steveanalizweb.com www.steveanalizweb.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name steveanalizweb.com www.steveanalizweb.com;

    ssl_certificate     /etc/letsencrypt/live/steveanalizweb.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/steveanalizweb.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # Proxy all traffic to the Node.js app (Docker container on port 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
