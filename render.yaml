# ============================================================
# Steve Analiz.web — Render.com Blueprint
# Static Site - Frontend only
# ============================================================

services:
  - type: web
    name: steve-analiz
    runtime: static
    branch: main
    rootDir: artifacts/steve-analiz
    buildCommand: npx pnpm@9 install --no-frozen-lockfile && npx pnpm@9 build
    staticPublishPath: dist/public
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
