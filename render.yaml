 # ============================================================
# Steve Analiz.web — Render.com Blueprint
# Deploy: connect your GitHub repo at render.com → "New Blueprint"
# ============================================================

databases:
  - name: steveanalizweb-db
    databaseName: steveanalizweb
    plan: free           # upgrade to starter/standard for production
    user: steveanalizweb

services:
  - type: web
    name: steveanalizweb-api
    runtime: node
    plan: free           # upgrade for more resources
    buildCommand: >
      corepack enable pnpm &&
      pnpm install --no-frozen-lockfile --prod=false &&
      cd artifacts/steve-analiz && PORT=3000 BASE_PATH=/ pnpm build &&
      cd ../api-server && pnpm build &&
      mkdir -p dist/public && cp -r ../steve-analiz/dist/public/* dist/public/
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: steveanalizweb-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false  
